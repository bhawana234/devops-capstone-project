[nosetests]
verbosity = 2
with-spec = 1
spec-color = 1
with-coverage = 1
cover-erase = 1
cover-package = service

[coverage:report]
show_missing = True

[flake8]
# Allow longer lines (modern Python style)
max-line-length = 100

# Ignore common autoformatter differences
extend-ignore = E203, W503

# Exclude irrelevant folders
exclude =
    venv,
    .git,
    __pycache__,
    .mypy_cache,
    .pytest_cache

# Per-file ignores for init files
per-file-ignores =
    */__init__.py: F401, E402

[pylint.'MESSAGES CONTROL']
disable = E1101